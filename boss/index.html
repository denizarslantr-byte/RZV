<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Patron Rezervasyon Takip</title>
<link rel="stylesheet" href="../assets/piano-theme.css">
<style>
  .list-head{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .hotel-block{margin-bottom:12px;border:1px solid var(--b2);border-radius:16px;overflow:hidden;background:var(--bg3)}
  .hotel-title{padding:11px 14px;background:rgba(216,170,75,.09);border-bottom:1px solid var(--b2);font-weight:900;color:var(--gold2);display:flex;justify-content:space-between;gap:8px}
  .mini-row{display:grid;grid-template-columns:70px 1fr 46px 46px;gap:8px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--b2);font-size:13px}
  .mini-row:last-child{border-bottom:0}
  .pillbox{width:22px;height:22px;border:1px solid rgba(255,255,255,.22);border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-weight:900}
  .dot{width:8px;height:8px;background:#facc15;border-radius:50%;display:block}
  .filled{background:#4ade80;border-color:#4ade80}
  .empty-msg{padding:12px 14px;color:var(--text2);font-size:12px}
  .legend{display:flex;gap:10px;flex-wrap:wrap;color:var(--text2);font-size:12px}
</style>
</head>
<body>
<div class="app">
  <div class="app-brand"><div class="p">P</div><div class="name">PIANO DERİ</div><div class="sub">PATRON TAKİP SAYFASI</div></div>
  <div id="apiWarning" class="notice" style="display:none"></div>
  <div class="panel-card">
    <div class="list-head">
      <button class="btn-dark btn-sm" onclick="location.href='../center/dashboard.html'">← Merkez</button>
      <label style="margin:0">Tarih</label><input type="date" id="d" onchange="load()" style="width:155px">
      <button class="btn-gold btn-sm" onclick="load()">↺ Yenile</button>
      <div style="flex:1"></div>
      <div class="legend"><span>Satış: <span class="pillbox"><span class="dot"></span></span></span><span>İçeride: boş kutu</span><span>Çıktı: <span class="pillbox filled"></span></span></div>
    </div>
    <div id="summary" style="color:var(--text2);font-size:13px"></div>
  </div>
  <div id="list"></div>
</div>
<script src="../config/config.js"></script>
<script src="../assets/common.js"></script>
<script>
showApiWarning();
d.value = todayStr();
let hotels=[], reservations=[];
function pax(r){return (Number(r.adult)||0)+(Number(r.child)||0)}
function inBox(r){
  const exited=String(r.cikti).toUpperCase()==='TRUE';
  return `<span class="pillbox ${exited?'filled':''}">${exited?'':''}</span>`;
}
function saleBox(r){return `<span class="pillbox">${String(r.satis).toUpperCase()==='TRUE'?'<span class="dot"></span>':''}</span>`}
function render(){
  const active = reservations.filter(r=>r.status!=='CANCELLED');
  summary.innerHTML = `${fmtDate(d.value)} · ${active.length} rezervasyon · ${active.reduce((s,r)=>s+pax(r),0)} pax`;
  const byHotel = {}; active.forEach(r=>{(byHotel[r.hotel] ||= []).push(r)});
  const allHotels = hotels.map(h=>h.hotel).filter(Boolean).sort((a,b)=>a.localeCompare(b,'tr'));
  list.innerHTML = allHotels.map(h=>{
    const rows=(byHotel[h]||[]).sort((a,b)=>String(a.time).localeCompare(String(b.time)));
    return `<div class="hotel-block"><div class="hotel-title"><span>🏨 ${h}</span><span>${rows.length?rows.length+' kayıt':'—'}</span></div>` +
      (rows.length ? rows.map(r=>`<div class="mini-row"><b>${r.time||'--:--'}</b><span>${pax(r)} pax · ${r.nation||'—'}</span>${saleBox(r)}${inBox(r)}</div>`).join('') : `<div class="empty-msg">Bugün kayıt yok</div>`) +
      `</div>`;
  }).join('');
}
async function load(){
  list.innerHTML='<div class="panel-card" style="text-align:center;color:var(--text2)">Yükleniyor...</div>';
  const data = await Promise.all([apiGet('getHotels'), apiGet('getReservations',{date:d.value})]);
  hotels=Array.isArray(data[0])?data[0]:[]; reservations=Array.isArray(data[1])?data[1]:[]; render();
}
load(); setInterval(load,30000);
</script>
</body>
</html>
