<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Piano Deri — Patron</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a14;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:#f0f0f0;font-size:13px}
    .brand{text-align:center;padding:16px 14px 10px}
    .brand .p{font-family:Georgia,serif;color:#f1d48a;font-size:38px;line-height:.7}
    .brand .n{font-family:Georgia,serif;letter-spacing:5px;font-size:20px;margin-top:4px}
    .brand .s{color:#d8aa4b;letter-spacing:4px;font-size:9px;margin-top:3px}
    .topbar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:rgba(18,19,24,.95);border-top:1px solid rgba(216,170,75,.15);border-bottom:1px solid rgba(216,170,75,.15)}
    .tbtn{background:rgba(30,31,40,.9);border:1px solid rgba(255,255,255,.1);color:#aaa;border-radius:6px;padding:6px 11px;font-size:11px;cursor:pointer}
    .tbtn.gold{background:rgba(216,170,75,.15);border-color:rgba(216,170,75,.4);color:#f1d48a;font-weight:700}
    .tbtn:active{opacity:.7}
    .date-lbl{flex:1;text-align:center;font-size:13px;font-weight:700;color:#f1d48a}
    .refresh{background:rgba(216,170,75,.12);border:1px solid rgba(216,170,75,.3);color:#f1d48a;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}
    .refresh.spin{animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #hdInput{position:absolute;opacity:0;width:0;height:0}
    .summary{font-size:11px;color:#666;padding:6px 14px;background:rgba(10,10,20,.8);border-bottom:1px solid rgba(255,255,255,.05)}
    .content{padding:10px 12px 60px}
    /* Otel kartı */
    .hcard{background:rgba(20,21,30,.95);border:1px solid rgba(255,255,255,.07);border-radius:12px;margin-bottom:8px;overflow:hidden}
    .hhdr{padding:9px 12px;display:flex;align-items:center;gap:7px;border-bottom:1px solid rgba(255,255,255,.05)}
    .hname{font-size:12px;font-weight:700;color:#f1d48a;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    /* Başlık rozetleri */
    .hbs{display:flex;gap:3px}
    .hb{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;border:1.5px solid}
    .hbi{background:rgba(234,179,8,.2);border-color:rgba(234,179,8,.6);color:#fde68a}
    .hbc{background:rgba(34,197,94,.2);border-color:rgba(34,197,94,.6);color:#4ade80}
    .hbs2{background:rgba(56,189,248,.2);border-color:rgba(56,189,248,.6);color:#7dd3fc}
    /* Rezervasyon satırı */
    .rrow{display:flex;align-items:stretch;border-bottom:1px solid rgba(255,255,255,.04);min-height:42px}
    .rrow:last-child{border-bottom:0}
    /* Sol durum kutusu - tam yükseklik */
    .rst{width:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;border-right:1px solid rgba(255,255,255,.06)}
    .rp{background:rgba(30,41,55,.4);color:#4b5563}
    .ri{background:rgba(234,179,8,.2);color:#fde68a}
    .rc{background:rgba(34,197,94,.18);color:#4ade80}
    .rx{background:rgba(239,68,68,.1);color:#f87171}
    /* Satış kutusu */
    .rsal{width:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;border-right:1px solid rgba(255,255,255,.06)}
    .rson{background:rgba(56,189,248,.18);color:#7dd3fc}
    /* İçerik */
    .rbody{flex:1;padding:7px 10px;display:flex;align-items:center;gap:8px}
    .rtime{font-size:14px;font-weight:900;color:#f1d48a;min-width:38px}
    .rdet .rpax{font-size:12px;color:#f0f0f0;font-weight:600}
    .rdet .rnat{font-size:10px;color:#777;margin-top:1px}
    .nodata{padding:14px;text-align:center;color:#444;font-size:11px}
    .load{text-align:center;padding:40px;color:#555}
    .spin2{width:22px;height:22px;border:2px solid rgba(255,255,255,.08);border-top-color:#d8aa4b;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px}
    .foot{text-align:center;font-size:10px;color:#444;padding:7px;position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,16,.95);border-top:1px solid rgba(255,255,255,.06)}
  </style>
</head>
<body>
<div class="brand">
  <div class="p">P</div>
  <div class="n">PIANO DERİ</div>
  <div class="s">SUBPatron</div>
</div>
<div class="topbar">
  <div class="tbtn" onclick="changeDay(-1)">◀</div>
  <div class="date-lbl" id="dateLbl" onclick="document.getElementById('hdInput').click()"></div>
  <div class="tbtn" onclick="changeDay(1)">▶</div>
  <div class="tbtn gold" onclick="goToday()">Bugün</div>
  <div class="refresh" id="rbtn" onclick="refresh()">↺</div>
</div>
<input type="date" id="hdInput" onchange="onDatePick()">
<div class="summary" id="summary"></div>
<div class="content" id="content"><div class="load"><div class="spin2"></div>Yükleniyor...</div></div>
<div class="foot" id="foot"></div>

<script src="../config/config.js"></script>
<script src="../assets/common.js"></script>
<script>
const DAYS=["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
let curDate=todayStr(),all=[];

function fmt(iso){if(!iso)return"";const p=iso.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function updHdr(){const d=new Date(curDate+"T00:00:00");document.getElementById("dateLbl").innerText=fmt(curDate)+" — "+DAYS[d.getDay()];hdInput.value=curDate;}
function changeDay(n){curDate=addDays(curDate,n);updHdr();load();}
function goToday(){curDate=todayStr();updHdr();load();}
function onDatePick(){if(hdInput.value){curDate=hdInput.value;updHdr();load();}}

function st(r){
  if(r.status==="CANCELLED")return"x";
  if(String(r.cikti).toUpperCase()==="TRUE")return"c";
  if(String(r.girdi).toUpperCase()==="TRUE")return"i";
  return"p";
}

function render(){
  const el=document.getElementById("content");
  const byH={};
  all.forEach(r=>{if(!byH[r.hotel])byH[r.hotel]=[];byH[r.hotel].push(r);});
  const total=all.length,pax=all.reduce((s,r)=>s+(Number(r.adult)||0)+(Number(r.child)||0),0);
  document.getElementById("summary").innerText=fmt(curDate)+" · "+total+" rezervasyon · "+pax+" pax";
  if(!total){el.innerHTML='<div class="load" style="padding:40px"><div style="font-size:28px;margin-bottom:8px">📭</div>Bu tarihte rezervasyon yok.</div>';return;}
  const hotels=Object.keys(byH).sort();
  el.innerHTML=hotels.map(hotel=>{
    const rv=byH[hotel].sort((a,b)=>String(a.time).localeCompare(String(b.time)));
    const hasI=rv.some(r=>st(r)==="i"),hasC=rv.some(r=>st(r)==="c");
    const hasS=rv.some(r=>String(r.satis).toUpperCase()==="TRUE"&&st(r)==="c");
    return '<div class="hcard">'+
      '<div class="hhdr">'+
        '<span style="font-size:13px">🏨</span>'+
        '<span class="hname">'+hotel+'</span>'+
        '<div class="hbs">'+
          (hasI?'<div class="hb hbi">İ</div>':"")+
          (hasC?'<div class="hb hbc">Ç</div>':"")+
          (hasS?'<div class="hb hbs2">S</div>':"")+
        '</div>'+
      '</div>'+
      rv.map(r=>{
        const s=st(r),pax=(Number(r.adult)||0)+(Number(r.child)||0);
        const isSatis=String(r.satis).toUpperCase()==="TRUE"&&s==="c";
        const lbl={p:"",i:"İ",c:"Ç",x:"✕"}[s];
        const cls={p:"rp",i:"ri",c:"rc",x:"rx"}[s];
        return '<div class="rrow">'+
          '<div class="rst '+cls+'">'+lbl+'</div>'+
          '<div class="rsal '+( isSatis?"rson":"")+'">'+( isSatis?"S":"")+'</div>'+
          '<div class="rbody">'+
            '<div class="rtime">'+r.time+'</div>'+
            '<div class="rdet">'+
              '<div class="rpax">'+pax+' kişi</div>'+
              '<div class="rnat">'+( r.nation||"—")+'</div>'+
            '</div>'+
          '</div>'+
        '</div>';
      }).join("")+
    '</div>';
  }).join("");
}

async function load(){
  document.getElementById("content").innerHTML='<div class="load"><div class="spin2"></div>Yükleniyor...</div>';
  try{
    const data=await apiGet("getReservations",{date:curDate});
    all=Array.isArray(data)?data:[];
    render();
    document.getElementById("foot").innerText="Son güncelleme: "+new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  }catch(e){document.getElementById("content").innerHTML='<div class="load"><div style="font-size:26px">⚠️</div>Bağlantı hatası.</div>';}
}
async function refresh(){rbtn.classList.add("spin");await load();rbtn.classList.remove("spin");}
updHdr();load();
setInterval(load,30000);
</script>
</body>
</html>
